name: Daily SEO Update

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  seo-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Run SEO update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/daily_seo_update.py
        continue-on-error: true

      - name: Check for changes
        id: git_check
        run: |
          git diff --quiet && echo "no_changes=true" >> $GITHUB_OUTPUT || echo "no_changes=false" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.git_check.outputs.no_changes == 'false'
        run: |
          git config user.name "SEO Bot"
          git config user.email "seo-bot@employercalculator.co.uk"
          git add data/seo_extras.json
          git commit -m "chore: daily SEO update $(date -u +%Y-%m-%d)"
          git push

      - name: Authenticate to Google Cloud
        if: steps.git_check.outputs.no_changes == 'false'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        if: steps.git_check.outputs.no_changes == 'false'
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        if: steps.git_check.outputs.no_changes == 'false'
        run: |
          gcloud run deploy employercalculator \
            --source . \
            --project firth-project-473009 \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --port 8080 \
            --quiet

      - name: Ping IndexNow
        if: steps.git_check.outputs.no_changes == 'false'
        run: |
          python - <<'EOF'
          import json, urllib.request
          base = "https://employercalculator.co.uk"
          key = "c9e5a2d7f4b10863fc9a765de9f21b4c"
          try:
              with open("data/seo_extras.json") as f:
                  data = json.load(f)
              guides = list(data.get("guides", {}).keys())
              urls = [base + "/"] + [base + "/guides/" + slug for slug in guides[-5:]]
          except Exception:
              urls = [base + "/"]
          payload = json.dumps({"host": "employercalculator.co.uk", "key": key,
              "keyLocation": base + "/static/" + key + ".txt",
              "urlList": urls[:50]}).encode()
          req = urllib.request.Request("https://api.indexnow.org/IndexNow",
              data=payload, headers={"Content-Type": "application/json"}, method="POST")
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  print(f"IndexNow: {r.status} — {len(urls)} URLs")
          except Exception as e:
              print(f"IndexNow ping failed (non-fatal): {e}")
          EOF
        continue-on-error: true

      - name: Summary
        run: |
          echo "### EmployerCalculator Daily SEO Update" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.git_check.outputs.no_changes }}" == "true" ]; then
            echo "Status: No changes (skipped deploy)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: ✅ Updated and deployed" >> $GITHUB_STEP_SUMMARY
          fi
