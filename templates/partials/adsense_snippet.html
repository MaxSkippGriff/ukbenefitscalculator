{% set ad_slot = adsense_slot_calculator or adsense_slot_content %}
{% if adsense_enabled and adsense_client and ad_slot %}
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="{{ adsense_client }}"
     data-ad-slot="{{ ad_slot }}"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
  (adsbygoogle = window.adsbygoogle || []).push({});
</script>
{% endif %}
